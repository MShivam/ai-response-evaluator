name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Run tests
      run: |
        python -m pytest tests/ -v --tb=short

    - name: Verify app imports
      run: |
        python -c "
        from database.db_manager import initialize_db
        from models.ai_clients import get_client
        from evaluators.auto_evaluator import evaluate_response
        from utils.export_utils import export_to_csv
        from utils.chart_utils import build_radar_chart
        print('All imports OK')
        "
