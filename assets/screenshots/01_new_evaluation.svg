<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1729"/>
      <stop offset="100%" style="stop-color:#1A2440"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="520" fill="#0D1117"/>
  <!-- Sidebar -->
  <rect width="200" height="520" fill="url(#bg)"/>
  <text x="20" y="38" fill="#E2E8F0" font-family="monospace" font-size="15" font-weight="bold">🧠 AI Evaluator</text>
  <line x1="10" y1="48" x2="190" y2="48" stroke="#334155" stroke-width="0.5"/>
  <!-- Nav items -->
  <rect x="8" y="58" width="184" height="28" rx="6" fill="#4F8EF7" fill-opacity="0.2"/>
  <rect x="14" y="65" width="3" height="14" rx="1" fill="#4F8EF7"/>
  <text x="24" y="78" fill="#93C5FD" font-family="monospace" font-size="12">🧪 New Evaluation</text>
  <text x="24" y="105" fill="#64748B" font-family="monospace" font-size="12">📊 Dashboard</text>
  <text x="24" y="130" fill="#64748B" font-family="monospace" font-size="12">📜 History</text>
  <text x="24" y="155" fill="#64748B" font-family="monospace" font-size="12">📤 Export</text>
  <!-- Main content area -->
  <text x="220" y="38" fill="#E2E8F0" font-family="monospace" font-size="18" font-weight="bold">🧪 New Evaluation</text>
  <text x="220" y="56" fill="#64748B" font-family="monospace" font-size="11">Submit a prompt to multiple AI models, then score the responses.</text>
  <!-- Prompt textarea -->
  <rect x="220" y="68" width="660" height="80" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="234" y="92" fill="#94A3B8" font-family="monospace" font-size="12">Your Prompt</text>
  <text x="234" y="112" fill="#CBD5E1" font-family="monospace" font-size="12">Explain how transformers work in deep learning.</text>
  <!-- Model selector -->
  <text x="220" y="168" fill="#94A3B8" font-family="monospace" font-size="12">Select AI Models</text>
  <rect x="220" y="176" width="130" height="26" rx="5" fill="#1E3A5F" stroke="#4F8EF7" stroke-width="1"/>
  <text x="232" y="193" fill="#93C5FD" font-family="monospace" font-size="11">✓ Mock-GPT-4o</text>
  <rect x="358" y="176" width="145" height="26" rx="5" fill="#1E3A5F" stroke="#4F8EF7" stroke-width="1"/>
  <text x="370" y="193" fill="#93C5FD" font-family="monospace" font-size="11">✓ Mock-Claude-3</text>
  <rect x="511" y="176" width="160" height="26" rx="5" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="523" y="193" fill="#64748B" font-family="monospace" font-size="11">Mock-GPT-4o-mini</text>
  <!-- Run button -->
  <rect x="220" y="212" width="145" height="32" rx="6" fill="#4F8EF7"/>
  <text x="260" y="233" fill="white" font-family="monospace" font-size="13" font-weight="bold">▶ Run Evaluation</text>
  <!-- Divider -->
  <line x1="220" y1="258" x2="880" y2="258" stroke="#334155" stroke-width="0.5"/>
  <!-- Responses section -->
  <text x="220" y="280" fill="#E2E8F0" font-family="monospace" font-size="14" font-weight="bold">💬 Responses</text>
  <!-- Response card 1 -->
  <rect x="220" y="292" width="200" height="130" rx="8" fill="#0F1729" stroke="#334155" stroke-width="1"/>
  <text x="232" y="310" fill="#E2E8F0" font-family="monospace" font-size="11" font-weight="bold">Mock-GPT-4o 🤖</text>
  <text x="232" y="326" fill="#6B7280" font-family="monospace" font-size="9">Excellent question about</text>
  <text x="232" y="339" fill="#6B7280" font-family="monospace" font-size="9">Explain how transformers…</text>
  <text x="232" y="352" fill="#6B7280" font-family="monospace" font-size="9">Let me break this down</text>
  <text x="232" y="365" fill="#6B7280" font-family="monospace" font-size="9">systematically. First, the</text>
  <text x="232" y="378" fill="#6B7280" font-family="monospace" font-size="9">historical context shows…</text>
  <text x="232" y="412" fill="#475569" font-family="monospace" font-size="9">⏱ 391ms  |  🔤 122 tokens</text>
  <!-- Response card 2 -->
  <rect x="432" y="292" width="200" height="130" rx="8" fill="#0F1729" stroke="#334155" stroke-width="1"/>
  <text x="444" y="310" fill="#E2E8F0" font-family="monospace" font-size="11" font-weight="bold">Mock-Claude-3 🤖</text>
  <text x="444" y="326" fill="#6B7280" font-family="monospace" font-size="9">I'd be happy to discuss</text>
  <text x="444" y="339" fill="#6B7280" font-family="monospace" font-size="9">this thoughtfully. This is</text>
  <text x="444" y="352" fill="#6B7280" font-family="monospace" font-size="9">an area with interesting</text>
  <text x="444" y="365" fill="#6B7280" font-family="monospace" font-size="9">nuances worth exploring</text>
  <text x="444" y="378" fill="#6B7280" font-family="monospace" font-size="9">carefully…</text>
  <text x="444" y="412" fill="#475569" font-family="monospace" font-size="9">⏱ 245ms  |  🔤 128 tokens</text>
  <!-- Auto eval table -->
  <text x="220" y="444" fill="#E2E8F0" font-family="monospace" font-size="13" font-weight="bold">🤖 Automated Evaluation</text>
  <rect x="220" y="452" width="660" height="54" rx="6" fill="#1E293B" stroke="#334155" stroke-width="0.5"/>
  <text x="232" y="468" fill="#94A3B8" font-family="monospace" font-size="10">Model           Accuracy  Completeness  Clarity  Creativity  Helpfulness  Weighted⭐</text>
  <text x="232" y="484" fill="#4ADE80" font-family="monospace" font-size="10">Mock-GPT-4o       6.7        6.9          7.7       8.5          5.5         6.96</text>
  <text x="232" y="498" fill="#FCD34D" font-family="monospace" font-size="10">Mock-Claude-3     6.7        6.6          7.5       8.2          4.4         6.59</text>
</svg>